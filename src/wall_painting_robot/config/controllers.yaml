controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

arm_controller:
  ros__parameters:
    joints:
      - manip_joint1
      - manip_joint2
      - manip_joint3
      - manip_joint4
      - manip_joint5
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 5.0
      manip_joint1: { trajectory: 0.1, goal: 0.1 }
      manip_joint2: { trajectory: 0.1, goal: 0.1 }
      manip_joint3: { trajectory: 0.1, goal: 0.1 }
      manip_joint4: { trajectory: 0.1, goal: 0.1 }
      manip_joint5: { trajectory: 0.1, goal: 0.1 }
