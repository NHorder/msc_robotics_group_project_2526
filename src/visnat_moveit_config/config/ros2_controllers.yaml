# This config file is used by ros2_control
controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

arm_controller:
  ros__parameters:
    joints:
      - manip_joint1
      - manip_joint2
      - manip_joint3
      - manip_joint4
      - manip_joint5
    command_interfaces:
      []
    state_interfaces:
      []